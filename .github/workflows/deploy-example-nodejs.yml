name: Deploy Example (Node.js)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "sam-pipeline image tag to use"
        required: false
        default: "1.0.6"

permissions:
  id-token: write   # required for OIDC to assume the pipeline role
  contents: read

jobs:
  deploy:
    name: Deploy Node.js example to all accounts
    runs-on: ubuntu-latest

    container:
      image: public.ecr.aws/${{ vars.ECR_ALIAS }}/sam-pipeline:${{ inputs.image_tag || '1.0.6' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          # ── Target accounts ────────────────────────────────────────────────
          # Store AWS_ACCOUNT_IDS as a GitHub Actions Variable (Settings → Variables)
          # Format: "ACCOUNT_ID:REGION,..."  e.g. "111122223333:us-east-1"
          AWS_ACCOUNT_IDS: ${{ vars.AWS_ACCOUNT_IDS }}
          DEPLOYER_ROLE_NAME: ${{ vars.DEPLOYER_ROLE_NAME }}

          # ── Runtime ────────────────────────────────────────────────────────
          RUNTIME_LANGUAGE: nodejs
          NODE_VERSION: "24"
          STAGE: dev

          # ── SAM options ────────────────────────────────────────────────────
          STACK_NAME: example-nodejs-service-sam-dev
          WORKING_DIRECTORY: example/nodejs
          SAM_ADDOPTS: >-
            --config-file samconfig.toml
            --config-env $STAGE
            --parameter-overrides
            Stage=$STAGE
            $SAM_PARAMETER_OVERRIDES
          SAM_PARAMETER_OVERRIDES: ${{ secrets.SAM_PARAMETER_OVERRIDES }}
          # Store as one space-separated line in GitHub Secret: SAM_PARAMETER_OVERRIDES
          # Note: python -m sam_pipeline runs sam validate automatically before build/deploy.

          # ── OIDC (injected automatically by GitHub Actions) ────────────────
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          CI: "true"
        run: python -m sam_pipeline
