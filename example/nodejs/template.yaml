AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  nodejs-service
  A simple Hello World Lambda function — Node.js example for sam-pipeline.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs24.x
    Architectures:
      - arm64

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: HelloWorldFunction
      CodeUri: src/
      Handler: handler.handler
      Description: Returns a greeting.
      Environment:
        Variables:
          GREETING_MESSAGE: "Hello from AWS Lambda!"
          ENVIRONMENT: Prod
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /hello
            Method: get

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello/"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt HelloWorldFunction.Arn
