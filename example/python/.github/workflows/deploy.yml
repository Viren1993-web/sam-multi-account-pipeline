name: Deploy (Python)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to all accounts
    runs-on: ubuntu-latest

    container:
      # Update to match your ECR_ALIAS set in GitHub repo Variables
      image: public.ecr.aws/${{ vars.ECR_ALIAS }}/sam-pipeline:1.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        env:
          # Store AWS_ACCOUNT_IDS as a GitHub Actions Variable (Settings → Variables)
          # Format: "ACCOUNT_ID:REGION,..."
          AWS_ACCOUNT_IDS: ${{ vars.AWS_ACCOUNT_IDS }}

          RUNTIME_LANGUAGE: python
          PYTHON_VERSION: "3.13.1"

          STACK_NAME: example-python-service

          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
          CI: "true"
        run: python -m sam_pipeline
